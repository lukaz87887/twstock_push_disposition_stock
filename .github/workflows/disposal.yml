name: 處置股推播

permissions:
  contents: write

on:
  schedule:
    # ⚠️ GitHub Actions cron 一律使用 UTC (不支援時區設定)
    # 台灣 = UTC+8 (無日光節約時間, 換算固定)
    #
    # 台北 08:00 = UTC 00:00  → 盤前提醒
    # 台北 18:05 = UTC 10:05  → 收盤後推最新 (證交所公告已出)
    # 台北 20:05 = UTC 12:05  → 重試 1
    # 台北 22:05 = UTC 14:05  → 重試 2
    # 台北 00:05 = UTC 16:05  → 最後嘗試 (前一天的 UTC 16:05)
    #
    # 星期換算: 台北週一~週五 → UTC 也是週一~週五 (因為時間都在白天)
    #           但台北 00:05 (隔天凌晨) = UTC 前一天 16:05 → 仍是週一~週五
    - cron: '0 0 * * 1-5'      # 台北 08:00 盤前提醒
    - cron: '5 10 * * 1-5'     # 台北 18:05 收盤後
    - cron: '5 12 * * 1-5'     # 台北 20:05 重試
    - cron: '5 14 * * 1-5'     # 台北 22:05 重試
    - cron: '5 16 * * 1-5'     # 台北 00:05 (隔天凌晨) 最後嘗試

  workflow_dispatch:
    inputs:
      force:
        description: '強制執行 (略過開盤/假日檢查)'
        type: boolean
        default: true

jobs:
  disposal:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝中文字型
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fontconfig
          fc-cache -f

      - name: 安裝 Python 套件
        run: pip install -r requirements.txt

      - name: 執行處置股任務
        env:
          TZ: Asia/Taipei
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          CHART_TARGETS: ${{ vars.CHART_TARGETS || 'telegram,line' }}
          # UTC 16:05 那班 = 台北 00:05 = 今日最後一次嘗試
          IS_LAST_ATTEMPT: ${{ github.event.schedule == '5 16 * * 1-5' && '1' || '0' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            python run_once.py disposal --force
          else
            python run_once.py disposal
          fi
