name: Keep Alive

# ⚠️ 為什麼需要這個:
# GitHub 會自動停用「公開 repo 連續 60 天沒有活動」的排程 workflow。
# 這個 workflow 每 20 天自動 commit 一次, 保持 repo 活躍, 讓處置股排程永遠不會被停用。

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 1,21 * *'    # 每月 1 號和 21 號 (約每 20 天一次)
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 更新 keepalive 時間戳
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%d %H:%M:%S UTC" > .github/last_keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_keepalive.txt
          git diff --staged --quiet || git commit -m "chore: keepalive (防止排程被自動停用)"
          git push
