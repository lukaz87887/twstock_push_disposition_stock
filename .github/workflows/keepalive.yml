name: Keep Alive

# 防止 GitHub 自動停用「60 天無活動」的排程 workflow
# 每月 1 號和 21 號自動 commit 一次, 保持 repo 活躍

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 1,21 * *'    # UTC 03:00 (台北 11:00), 每月 1 號和 21 號
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 更新 keepalive 時間戳
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%d %H:%M:%S UTC" > .github/last_keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_keepalive.txt
          git diff --staged --quiet || git commit -m "chore: keepalive"
          git push
